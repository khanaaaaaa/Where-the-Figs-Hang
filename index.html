<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Where the Figs Hang</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="quote">"I saw my life branching out before me like the green fig tree…"</div>
  <div id="tree">
    <div class="stem"></div>
    <div class="branch-row">
      <div class="fig" data-name="Love"    data-msg="to love is to lose yourself willingly.">Love</div>
      <div class="fig" data-name="Art"     data-msg="to create is to bleed in silence.">Art</div>
      <div class="fig" data-name="Success" data-msg="to succeed is to outgrow your own skin.">Success</div>
      <div class="fig" data-name="Freedom" data-msg="to be free is to belong nowhere.">Freedom</div>
    </div>
  </div>
  <div id="message"></div>
  <div id="footer">Inspired by Sylvia Plath's The Bell Jar</div>
  <script src="script.js"></script>
</body>
</html>
